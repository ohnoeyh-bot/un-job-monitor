name: daily-check

# 외교부 사이트가 해외 IP(GitHub 러너)를 차단해 클라우드 수집은 불가.
# 수집·푸시는 로컬 맥의 launchd(run_and_push.sh)가 담당하고, 이 워크플로는 수동 테스트용.
on:
  workflow_dispatch:

permissions:
  contents: write

env:
  TZ: Asia/Seoul

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run collector
        run: python3 check.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.js seen.json
          git diff --cached --quiet || git commit -m "chore: update job data $(date -u +%F)"
          git push
